
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Diseño Mecánico - Generador de Planos Técnicos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;600;700&family=Archivo+Black&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
          --bg-dark: #0d1117;
          --bg-card: #161b22;
          --bg-hover: #1c2128;
          --border: #30363d;
          --accent-cyan: #00d9ff;
          --accent-orange: #ff6b35;
          --accent-green: #39d353;
          --accent-purple: #a371f7;
          --text-primary: #f0f6fc;
          --text-secondary: #8b949e;
          --shadow-glow: rgba(0, 217, 255, 0.15);
        }

        body {
            font-family: 'Roboto Mono', monospace;
            background-color: var(--bg-dark);
            color: var(--text-primary);
        }
        
        .archivo-black {
            font-family: 'Archivo Black', sans-serif;
        }

        .blueprint-grid-bg {
            background-image: 
                linear-gradient(rgba(0, 217, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 217, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .scanline::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0, 217, 255, 0.1), transparent);
            animation: scanline 4s linear infinite;
            pointer-events: none;
        }

        .formula-box {
          background: rgba(0, 217, 255, 0.05);
          border: 1px solid var(--accent-cyan);
        }

        .result-box {
          background: linear-gradient(135deg, rgba(0, 217, 255, 0.1), rgba(57, 211, 83, 0.1));
          border: 2px solid var(--accent-cyan);
        }
    </style>
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4"
      }
    }
    </script>
</head>
<body class="blueprint-grid-bg">
    <div id="root"></div>
</body>
</html>
